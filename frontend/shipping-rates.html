</head>

<body>

  <div class="container">

    <h1>Shipping Rates</h1>

    <table>

      <tr>
        <th>Weight</th>
        <th>Price</th>

      <tr>

        <td>₹100</td>

      <tr>
        <td>5 - 10 KG</td>

      </tr>

      <tr>
        <td>10 - 20 KG</td>

      </tr>

      <tr>
        <td>20+ KG</td>
        <td>₹500</td>
      </tr>

    </table>

  </div>
