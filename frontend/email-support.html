<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Support - Prime Xpress</title>

  <link rel="stylesheet" href="email-support.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<section class="email-page">

  <div class="email-box">

    <i class="fa-solid fa-envelope"></i>

    <h1>Email Support</h1>

    <p>
      Send your shipment queries, delivery complaints,
      or support requests through email.
    </p>

    <div class="email-id">
      support@primexpress.com
    </div>

    <a href="mailto:support@primexpress.com" class="email-btn">
      Send Email
    </a>

  </div>

</section>

</body>
</html>
